
services:
  db:
    image: postgres:18-alpine
    container_name: meteomax-db
    environment:
      POSTGRES_DB: meteomax
      POSTGRES_USER: meteomax
      POSTGRES_PASSWORD: meteomax
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./resources/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meteomax -d meteomax"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
